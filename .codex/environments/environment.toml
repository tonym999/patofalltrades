[env]
# Force temp and cache directories to Linux-safe locations.
TMPDIR = "/tmp"
TMP = "/tmp"
TEMP = "/tmp"
XDG_CACHE_HOME = "/tmp/codex-cache"
COREPACK_HOME = "/tmp/corepack"

[setup]
# Fallback script to ensure the shell runner evaluates the environment.
linux = """
export TMPDIR=/tmp
export TMP=/tmp
export TEMP=/tmp
export XDG_CACHE_HOME=/tmp/codex-cache
export COREPACK_HOME=/tmp/corepack
mkdir -p "$XDG_CACHE_HOME" "$COREPACK_HOME"
export NVM_DIR="$HOME/.nvm"
[ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
[ -f "$PWD/.nvmrc" ] && nvm use --silent >/dev/null 2>&1
"""
